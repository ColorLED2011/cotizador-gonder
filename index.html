<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

  <!-- PWA -->
  <meta name="theme-color" content="#F2C200">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GONDER">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Cotizador GONDER</title>

  <style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',system-ui,sans-serif}
body{background:transparent}
.phone{width:370px;background:#f8fafc;border-radius:28px;border:6px solid #e2e8f0;overflow:hidden;margin:0 auto;box-shadow:0 0 0 1px #cbd5e1}
.notch{width:70px;height:5px;background:#d4a900;border-radius:4px;margin:7px auto 0}
.hdr{background:#F2C200;padding:8px 12px;display:flex;align-items:center;gap:10px;min-height:58px}
.mini-logo{flex-shrink:0;height:48px;width:auto}
.brand{flex:1;min-width:0}
.b-name{font-size:13px;font-weight:800;color:#000}
.b-sub{font-size:8px;color:#1a1a1a;font-weight:600;letter-spacing:.02em;margin-top:1px}
.tasa-pill{background:#5989ff;border-radius:8px;padding:4px 10px;text-align:right;flex-shrink:0;position:relative}
.tasa-l{font-size:8px;color:#dbeafe;text-transform:uppercase;letter-spacing:.05em}
.tasa-v{font-size:13px;font-weight:700;color:#fff}
.screen{display:none;height:580px;overflow-y:auto}
.screen.active{display:block}
.body{padding:12px}
.sec{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:12px;margin-bottom:10px}
.sec-title{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.sec-title svg{width:12px;height:12px;stroke:#64748b;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.field{margin-bottom:8px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:10px;font-weight:600;color:#475569;margin-bottom:4px}
.field input{width:100%;padding:9px 11px;font-size:12px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;color:#1e293b;outline:none}
.field input:focus{border-color:#F2C200;background:#fff;box-shadow:0 0 0 3px #F2C20030}
.field input::placeholder{color:#94a3b8}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.search-row{display:flex;gap:7px;align-items:center}
.inp-search{flex:1;padding:9px 11px;font-size:12px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;color:#1e293b;outline:none}
.inp-search:focus{border-color:#F2C200;background:#fff;box-shadow:0 0 0 3px #F2C20030}
.inp-search::placeholder{color:#94a3b8}
.btn-scan{background:#000;border:none;border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:5px;cursor:pointer;color:#F2C200;font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap;line-height:1}
.scan-emo{font-size:15px;line-height:1}
.btn-catalogo{background:#F2C200;border:2px solid #000;border-radius:10px;padding:10px 0;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:13px;font-weight:800;color:#000;margin-top:8px}
.dd-wrap{position:relative;flex:1}
.dd{background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;margin-top:5px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.08);display:none;position:absolute;left:0;right:0;z-index:10}
.dd-item{padding:9px 11px;cursor:pointer;display:flex;align-items:center;gap:9px;border-bottom:0.5px solid #f1f5f9}
.dd-item:last-child{border-bottom:none}.dd-item:hover{background:#f8fafc}
.dd-img-sm{width:32px;height:32px;border-radius:6px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dd-info{flex:1;min-width:0}
.dd-name{font-size:11px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-prices{font-size:10px;color:#64748b;margin-top:1px}
.pe{color:#10B981;font-weight:600}.pb{color:#5989ff;font-weight:600}
.dd-cod{font-size:10px;color:#94a3b8;flex-shrink:0}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:460px}
thead tr{background:#f8fafc}
th{padding:7px 8px;font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e2e8f0;text-align:left;white-space:nowrap}
th.r{text-align:right}th.c{text-align:center}
td{padding:7px 8px;font-size:11px;color:#1e293b;border-bottom:0.5px solid #f1f5f9;vertical-align:middle}
.prod-img-placeholder{width:38px;height:38px;border-radius:8px;background:#f1f5f9;border:0.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:20px}
.prod-name{font-size:11px;font-weight:600;color:#1e293b}
.prod-uom{font-size:9px;color:#94a3b8}
.qty-wrap{display:flex;align-items:center;gap:3px;justify-content:center}
.qb{width:20px;height:28px;border-radius:5px;border:1px solid #e2e8f0;background:#f8fafc;color:#475569;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qty-inp{width:52px;font-size:12px;font-weight:700;text-align:center;border:1px solid #F2C20088;border-radius:6px;padding:4px;background:#fff;color:#1e293b;outline:none;-moz-appearance:textfield}
.qty-inp::-webkit-inner-spin-button,.qty-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.sub-e{color:#10B981;font-weight:700;text-align:right;font-size:11px;white-space:nowrap}
.sub-b{color:#5989ff;font-weight:700;text-align:right;font-size:11px;white-space:nowrap}
.sub-bs{color:#3b82f6;font-size:9px;text-align:right;white-space:nowrap}
.del{background:none;border:none;cursor:pointer;color:#cbd5e1;padding:2px}
.del:hover{color:#ef4444}
.totals{padding:10px 12px;background:#fff;border-top:1px solid #e2e8f0}
.tot-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tot-lbl{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.tot-e{font-weight:700;font-size:12px;color:#10B981}
.tot-b{font-weight:700;font-size:12px;color:#5989ff}
.tot-bs{font-weight:700;font-size:15px;color:#1e40af}
.divline{border:none;border-top:1px solid #e2e8f0;margin:6px 0}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.btn-send{background:#000;border:none;border-radius:10px;color:#F2C200;font-size:11px;font-weight:800;padding:11px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-send:disabled{opacity:.55;cursor:not-allowed}
.btn-wa{background:#fff;border:2px solid #25D366;border-radius:10px;color:#128C3E;font-size:11px;font-weight:800;padding:11px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-wa:hover{background:#f0fdf4}
.wa-icon{width:18px;height:18px;flex-shrink:0}
.badge-e{display:inline-block;font-size:8px;font-weight:700;color:#10B981;background:#10B98115;border:1px solid #10B98140;border-radius:3px;padding:1px 4px}
.badge-b{display:inline-block;font-size:8px;font-weight:700;color:#5989ff;background:#5989ff15;border:1px solid #5989ff40;border-radius:3px;padding:1px 4px}
.wa-preview{background:#e8fdf0;border:1.5px solid #25D36640;border-radius:12px;padding:10px 12px;margin:10px 12px;font-size:10px;color:#1a3a2a;line-height:1.6;white-space:pre-wrap;font-family:monospace;display:none}
.wa-preview.show{display:block}
.cat-topbar,.ficha-topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border-bottom:1px solid #e2e8f0}
.btn-back{background:none;border:none;cursor:pointer;color:#000;font-size:11px;font-weight:700;padding:0}
.cat-title{font-size:13px;font-weight:800;color:#000;flex:1}
.cat-body{padding:12px}
.cat-search-row{display:flex;gap:7px;align-items:center;margin-bottom:12px}
.cat-inp{flex:1;padding:9px 11px;font-size:12px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;color:#1e293b;outline:none}
.cat-inp:focus{border-color:#F2C200;background:#fff}
.cat-inp::placeholder{color:#94a3b8}
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-card{background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.cat-card:hover{border-color:#F2C200}
.cat-card-img{width:44px;height:44px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.cat-card-info{flex:1;min-width:0}
.cat-card-name{font-size:12px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-card-cod{font-size:10px;color:#94a3b8}
.cat-card-prices{display:flex;gap:8px;margin-top:3px}
.cat-arr{color:#94a3b8;font-size:16px}
.ficha-body{padding:12px}
.ficha-img{width:100%;height:140px;background:#f1f5f9;border-radius:12px;border:0.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:72px;margin-bottom:12px}
.ficha-nombre{font-size:15px;font-weight:800;color:#1e293b;margin-bottom:2px}
.ficha-cod{font-size:10px;color:#94a3b8;margin-bottom:12px}
.precio-bloque{background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.precio-bloque-title{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.precio-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.precio-row:last-child{margin-bottom:0}
.precio-lbl{font-size:10px;color:#64748b}
.precio-val-e{font-size:14px;font-weight:700;color:#10B981}
.precio-val-b{font-size:14px;font-weight:700;color:#5989ff}
.precio-val-bs{font-size:11px;color:#3b82f6;font-weight:600}
.emb-badge{display:inline-flex;align-items:center;background:#F2C20020;border:1px solid #F2C20060;border-radius:5px;padding:2px 6px;font-size:9px;font-weight:700;color:#92700a;margin-bottom:6px}
.btn-agregar{width:100%;background:#000;border:none;border-radius:10px;color:#F2C200;font-size:12px;font-weight:800;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#25D366;color:#fff;font-size:11px;font-weight:700;padding:7px 16px;border-radius:20px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}

/* ── PWA: pantalla completa en movil real ── */
@media (max-width: 430px) {
  html, body { height: 100%; margin: 0; padding: 0; background: #f8fafc; }
  div[style*="padding:.75rem"] { padding: 0 !important; }
  .phone {
    width: 100%;
    border-radius: 0;
    border: none;
    box-shadow: none;
    margin: 0;
  }
  .notch { display: none; }
  .screen { height: calc(100dvh - 68px); }
}
/* Safe-area para muesca (iPhone X+) */
@supports (padding-top: env(safe-area-inset-top)) {
  @media (max-width: 430px) {
    .hdr {
      padding-top: calc(8px + env(safe-area-inset-top));
      padding-left: calc(12px + env(safe-area-inset-left));
      padding-right: calc(12px + env(safe-area-inset-right));
    }
    .toast { bottom: calc(18px + env(safe-area-inset-bottom)); }
  }
}
  </style>
</head>
<body>

<div style="padding:.75rem 0">
<div class="phone">
  <div class="notch"></div>
  <div class="hdr">
    <svg class="mini-logo" viewBox="0 0 110 52" xmlns="http://www.w3.org/2000/svg">
      <rect x="1.5" y="1.5" width="107" height="49" fill="#F2C200" stroke="#000" stroke-width="3" rx="2"/>
      <text x="54" y="27" font-family="Arial Black,Impact,sans-serif" font-size="26" font-weight="900" fill="#000" text-anchor="middle" dominant-baseline="middle" font-style="italic" letter-spacing="-0.5">GONDER</text>
      <line x1="10" y1="37" x2="100" y2="37" stroke="#000" stroke-width="1.2"/>
      <text x="54" y="46" font-family="Arial,sans-serif" font-size="5.2" font-weight="700" fill="#000" text-anchor="middle" letter-spacing="0.3">FERRETERÍA • PINTURA • ILUMINACIÓN</text>
    </svg>
    <div class="brand">
      <div class="b-name">Cotizador GONDER</div>
      <div class="b-sub">Sucursales</div>
    </div>
    <div class="tasa-pill">
      <!-- Indicador de estado Odoo -->
      <div id="odoo-dot" style="position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:#64748b;border:2px solid #F2C200;transition:background .4s" title="Odoo: desconectado"></div>
      <div class="tasa-l">BCV Hoy</div>
      <div class="tasa-v">Bs. <span id="tasa-val">—</span></div>
    </div>
  </div>

  <!-- PANTALLA PRINCIPAL -->
  <div class="screen active" id="scr-main">
    <div class="body">

      <!-- Vendedor -->
      <div class="sec">
        <div class="sec-title">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
          Vendedor
        </div>
        <div class="field">
          <label>Nombre del vendedor</label>
          <input type="text" id="inp-vendedor" placeholder="Tu nombre..." autocomplete="off"/>
        </div>
      </div>

      <!-- Cliente con búsqueda Odoo -->
      <div class="sec">
        <div class="sec-title">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
          Cliente
        </div>
        <div class="two-col">
          <!-- Campo Nombre con autocomplete Odoo -->
          <div class="field" style="position:relative">
            <label>Nombre</label>
            <input type="text" id="inp-cliente" placeholder="Buscar cliente..."
              autocomplete="off" oninput="onClientInput(this.value)"/>
            <div class="dd" id="dd-client"></div>
          </div>
          <!-- Campo Cedula/RIF -->
          <div class="field">
            <label>Cedula / RIF</label>
            <input type="text" id="inp-cedula" placeholder="V-00.000.000" autocomplete="off"/>
          </div>
        </div>
      </div>

      <!-- Buscar producto -->
      <div class="sec">
        <div class="sec-title">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Buscar producto
        </div>
        <div class="search-row">
          <div class="dd-wrap">
            <input class="inp-search" id="inp-q" placeholder="Codigo, nombre o barra..."
              oninput="onSearch(this.value)"
              onfocus="if(this.value.trim())onSearch(this.value)"
              autocomplete="off"/>
            <div class="dd" id="dd"></div>
          </div>
          <button class="btn-scan" onclick="simScan()"><span class="scan-emo">📷</span>Escanear</button>
        </div>
        <button class="btn-catalogo" onclick="goTo('scr-cat')">📚 Catalogo</button>
      </div>

      <!-- Tabla del carrito -->
      <div class="sec" style="padding:0;overflow:hidden">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>Cód.</th><th class="c">Img.</th><th>Descripcion</th>
              <th class="c">Cant.</th>
              <th class="r"><span class="badge-e">USD</span></th>
              <th class="r"><span class="badge-b">BCV</span>/Bs.</th>
              <th></th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="wa-preview" id="wa-preview"></div>
        <div class="totals">
          <div class="tot-row"><span class="tot-lbl">Total USD</span><span class="tot-e" id="tot-e">$ 0.00</span></div>
          <div class="tot-row"><span class="tot-lbl">Total USD BCV</span><span class="tot-b" id="tot-b">$ 0.00</span></div>
          <hr class="divline"/>
          <div class="tot-row"><span class="tot-lbl">Total Bs. (BCV)</span><span class="tot-bs" id="tot-bs">Bs. 0.00</span></div>
          <div class="btn-row">
            <button class="btn-send" id="btn-odoo" onclick="sendToOdoo()">✉️ Enviar a Odoo</button>
            <button class="btn-wa" onclick="enviarWA()">
              <svg class="wa-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="16" fill="#25D366"/>
                <path d="M22.5 9.5A9.1 9.1 0 0016 7a9 9 0 00-7.8 13.5L7 25l4.6-1.2A9 9 0 0025 16a9 9 0 00-2.5-6.5z" fill="#fff"/>
                <path d="M20.5 18.3c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.2-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1s-1.2-.4-2.3-1.4c-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.4.1-.6l.4-.5c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5s-.7-1.6-.9-2.2c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.1 2 3.1 4.9 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.7-.7 1.9-1.4.2-.6.2-1.2.1-1.3-.1-.1-.3-.2-.6-.3z" fill="#25D366"/>
              </svg>
              WhatsApp
            </button>
          </div>
        </div>
      </div>

    </div>
  </div><!-- /scr-main -->

  <!-- CATÁLOGO -->
  <div class="screen" id="scr-cat">
    <div class="cat-topbar">
      <button class="btn-back" onclick="goTo('scr-main')">← Volver</button>
      <span class="cat-title">Catalogo GONDER</span>
    </div>
    <div class="cat-body">
      <div class="cat-search-row">
        <input class="cat-inp" id="cat-q" placeholder="Buscar por código o nombre..."
          oninput="filterCat(this.value)" autocomplete="off"/>
        <button class="btn-scan" onclick="simScanCat()"><span class="scan-emo">📷</span>Escanear</button>
      </div>
      <div class="cat-list" id="cat-list"></div>
    </div>
  </div>

  <!-- FICHA PRODUCTO -->
  <div class="screen" id="scr-ficha">
    <div class="ficha-topbar">
      <button class="btn-back" onclick="goTo('scr-cat')">← Catalogo</button>
      <span class="cat-title" id="ficha-header">Producto</span>
    </div>
    <div class="ficha-body" id="ficha-body"></div>
  </div>

</div><!-- /phone -->
</div>

<script>
/* ── Service Worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(e => console.warn('SW:', e));
  });
}

/* ═══════════════════════════════════════════════════════════════
   CONFIGURACIÓN — Editar antes de desplegar en producción
   ═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  /* — Odoo — */
  ODOO_URL:   'https://gonder.odoo.com',        // URL completa, sin "/" al final
  ODOO_DB:    'gonder',             // Nombre exacto de la base de datos
  ODOO_USER:  'grupogonder@gmail.com',           // Email del usuario vendedor
  ODOO_PASS:  'Gonder2011',       // Contraseña o API Key (Odoo 16+)

  /* — Campos de precio en Odoo (product.product) — */
  FIELD_USD:  'list_price',
  FIELD_BCV:  'list_price',                    // Precio USD base
  PRICELIST_BCV:   15,                   // Precio USD BCV (campo personalizado)

  /* — APIs para tasa BCV (se intentan en orden) — */
  BCV_APIS: [
    { url: 'https://ve.dolarapi.com/v1/dolares/oficial',             key: 'promedio' },
    { url: 'https://pydolarve.org/api/v1/dollar?monitor=bcv',        key: 'price'    },
    { url: 'https://api.exchangedohlar.com/v1/rates/USD/VES',         key: 'rate'     },
  ],

  /* — Modo demo: usa productos locales si Odoo no está disponible — */
  DEMO_FALLBACK: true,
};

/* ═══════════════════════════════════════════════════════════════
   ESTADO GLOBAL
   ═══════════════════════════════════════════════════════════════ */
let TASA             = 48.75;   // Se actualiza desde BCV
let odooAuthenticated = false;
let selectedPartnerId = null;   // ID del partner seleccionado de Odoo
let cart             = [];
let PRODS            = [];      // Se carga desde Odoo o desde DEMO_PRODS
let _clientTimer     = null;
let _productTimer    = null;

/* ═══════════════════════════════════════════════════════════════
   UTILIDADES
   ═══════════════════════════════════════════════════════════════ */
const fUSD  = n => '$' + Number(n).toFixed(2);
const fBs   = n => 'Bs.' + Number(n).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});
const clamp = n => Math.max(0.01, Math.round(n * 100) / 100);

/** Signal con timeout compatible con browsers legacy */
function makeSignal(ms) {
  if (typeof AbortSignal !== 'undefined' && typeof AbortSignal.timeout === 'function')
    return AbortSignal.timeout(ms);
  const c = new AbortController();
  setTimeout(() => c.abort(), ms);
  return c.signal;
}

function getProds() { return PRODS.length ? PRODS : DEMO_PRODS; }

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  const colors = { success:'#25D366', warn:'#f59e0b', error:'#ef4444', info:'#5989ff' };
  t.style.background = colors[type] || '#25D366';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3200);
}

function setOdooStatus(status) {
  const el = document.getElementById('odoo-dot');
  if (!el) return;
  const colors = { ok:'#25D366', error:'#ef4444', connecting:'#f59e0b', off:'#64748b' };
  el.style.background = colors[status] || '#64748b';
  const labels = { ok:'Odoo: Conectado ✓', error:'Odoo: Sin conexión', connecting:'Odoo: Conectando...', off:'Odoo: No configurado' };
  el.title = labels[status] || '';
}

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'scr-cat') renderCat(getProds());
}

/* ═══════════════════════════════════════════════════════════════
   REGLA 2 · TASA BCV EN TIEMPO REAL
   ═══════════════════════════════════════════════════════════════ */
async function fetchBCVRate() {
  /* Intento 1 & 2: APIs de tasas venezolanas */
  for (const api of CONFIG.BCV_APIS) {
    try {
      const res = await fetch(api.url, { signal: makeSignal(6000) });
      if (!res.ok) continue;
      const data = await res.json();
      const rate = parseFloat(data[api.key]);
      if (!isNaN(rate) && rate > 1) { applyTasa(rate); return; }
    } catch (_) { /* próximo intento */ }
  }

  /* Intento 3: scraping bcv.org.ve vía CORS proxy */
  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.bcv.org.ve/');
    const res = await fetch(proxy, { signal: makeSignal(9000) });
    if (res.ok) {
      const { contents } = await res.json();
      /* El BCV publica la tasa en un strong dentro del bloque #dolar */
      const m = contents.match(/id="dolar"[\s\S]{0,300}?<strong>([\d.,]+)<\/strong>/i)
             || contents.match(/<strong>([\d]{2,3}[,\.]\d{2,4})<\/strong>/);
      if (m) {
        const rate = parseFloat(m[1].replace(',', '.'));
        if (!isNaN(rate) && rate > 1) { applyTasa(rate); return; }
      }
    }
  } catch (_) {}

  /* Fallback: mantener tasa hardcoded */
  applyTasa(TASA, true);
}

function applyTasa(rate, isCache = false) {
  TASA = rate;
  document.getElementById('tasa-val').textContent = rate.toFixed(2);
  if (!isCache) toast('💱 Tasa BCV actualizada: Bs. ' + rate.toFixed(2), 'info');
  if (cart.length) updateTotals();
}

/* ═══════════════════════════════════════════════════════════════
   ODOO · CAPA JSON-RPC
   ═══════════════════════════════════════════════════════════════ */
async function odooFetch(path, params) {
  const res = await fetch('https://gonder-proxy.grupogonder.workers.dev' + path, {
    method:      'POST',
    headers:     { 'Content-Type': 'application/json' },          // Envía cookies de sesión
    body:        JSON.stringify({ jsonrpc:'2.0', method:'call', id: Date.now(), params }),
    signal:      makeSignal(14000),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.error) {
    const msg = json.error.data?.message || json.error.message || 'Error Odoo';
    throw new Error(msg);
  }
  return json.result;
}

async function odooRPC(model, method, args, kwargs = {}) {
  return odooFetch('/web/dataset/call_kw', { model, method, args, kwargs });
}

async function odooAuthenticate() {
  if (odooAuthenticated) return true;
  const result = await odooFetch('/web/session/authenticate', {
    db:       CONFIG.ODOO_DB,
    login:    CONFIG.ODOO_USER,
    password: CONFIG.ODOO_PASS,
  });
  if (!result?.uid) throw new Error('Credenciales incorrectas o BD inválida');
  odooAuthenticated = true;
  return true;
}

async function tryOdooConnect() {
  /* Si la URL no fue configurada, usar modo demo */
  if (CONFIG.ODOO_URL.includes('YOUR-ODOO')) {
    setOdooStatus('off');
    if (CONFIG.DEMO_FALLBACK) { PRODS = [...DEMO_PRODS]; renderCat(PRODS); }
    return;
  }
  setOdooStatus('connecting');
  try {
    await odooAuthenticate();
    setOdooStatus('ok');
    /* Cargar catálogo inicial desde Odoo */
    const prods = await loadOdooProducts('');
    if (prods.length) { PRODS = prods; renderCat(PRODS); }
    toast('✅ Odoo conectado', 'success');
  } catch (err) {
    setOdooStatus('error');
    if (CONFIG.DEMO_FALLBACK) {
      PRODS = [...DEMO_PRODS];
      renderCat(PRODS);
      toast('⚠️ Odoo sin conexión – Modo Demo activo', 'warn');
    } else {
      toast('❌ Odoo: ' + err.message, 'error');
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   REGLA 3 · BÚSQUEDA Y GESTIÓN DE CLIENTES

async function onClientInput(val) {
  clearTimeout(_clientTimer);
  const dd = document.getElementById('dd-client');
  /* Limpiar selección previa al modificar el campo */
  selectedPartnerId = null;
  if (!val || val.trim().length < 2 || !odooAuthenticated) {
    dd.style.display = 'none'; return;
  }
  _clientTimer = setTimeout(async () => {
    try {
      const q = val.trim();
      const partners = await odooRPC('res.partner', 'search_read',
        [[
          '|',
          ['name', 'ilike', q],
          ['vat',  'ilike', q],
          ['active', '=', true],
        ]],
        { fields: ['id','name','vat','phone','email'], limit: 6 }
      );
      showClientDD(partners);
    } catch (err) {
      /* Error silencioso: el vendedor puede seguir escribiendo manualmente */
      console.warn('[Cliente]', err.message);
    }
  }, 420);
}

function showClientDD(partners) {
  const dd = document.getElementById('dd-client');
  if (!partners.length) {
    dd.innerHTML = `<div class="dd-item" style="color:#94a3b8;cursor:default;font-size:11px">
      Sin resultados — se creará como cliente nuevo
    </div>`;
    dd.style.display = 'block'; return;
  }
  dd.innerHTML = partners.map(p => {
    const sub  = [p.vat, p.phone].filter(Boolean).join(' · ');
    const name = (p.name || '').replace(/'/g, "\\'");
    const vat  = (p.vat  || '').replace(/'/g, "\\'");
    return `<div class="dd-item" onclick="selectPartner(${p.id},'${name}','${vat}')">
      <div class="dd-img-sm">👤</div>
      <div class="dd-info">
        <div class="dd-name">${p.name}</div>
        <div class="dd-prices">${sub}</div>
      </div>
    </div>`;
  }).join('');
  dd.style.display = 'block';
}

function selectPartner(id, name, vat) {
  selectedPartnerId = id;
  document.getElementById('inp-cliente').value = name;
  document.getElementById('inp-cedula').value  = vat;
  document.getElementById('dd-client').style.display = 'none';
  toast('✓ Cliente: ' + name, 'success');
}

/* ═══════════════════════════════════════════════════════════════
   REGLA 4 · BÚSQUEDA DE PRODUCTOS DESDE ODOO
   ═══════════════════════════════════════════════════════════════ */
async function loadOdooProducts(q) {
  const domain = [['sale_ok','=',true],['active','=',true]];
  if (q) {
    /* Búsqueda por barcode, referencia interna o nombre */
    domain.push('|','|',
      ['barcode',      'ilike', q],
      ['default_code', 'ilike', q],
      ['name',         'ilike', q]
    );
  }
  const rows = await odooRPC('product.template', 'search_read',
    [domain],
    {
      fields: [
        'id','name','default_code','barcode','uom_id',
        CONFIG.FIELD_USD,
      ],
      limit: 0,
    }
  );
  /* BCV desde pricelist */
  const _bcv = {};
  try {
    const _ids = rows.map(p => p.id);
    const _items = await odooRPC('product.pricelist.item','search_read',
      [[['pricelist_id','=',CONFIG.PRICELIST_BCV],['product_tmpl_id','in',_ids]]],
      {fields:['product_tmpl_id','fixed_price'],limit:2000});
    _items.forEach(i => { _bcv[i.product_tmpl_id[0]] = i.fixed_price; });
  } catch(_e) {}
  return rows.map(p => ({
    id:     p.id,
    cod:    p.default_code || String(p.id),
    nombre: p.name,
    uom:    Array.isArray(p.uom_id) ? p.uom_id[1] : (p.uom_id || 'Un'),
    emb:    null,
    pe:     parseFloat(p[CONFIG.FIELD_USD]) || 0,
    pb:     parseFloat(_bcv[p.id]) || parseFloat(p[CONFIG.FIELD_USD]) || 0,
    emoji:  '📦',
  }));
}

async function onSearch(q) {
  clearTimeout(_productTimer);
  const dd = document.getElementById('dd');
  const lq = q.trim().toLowerCase();
  if (!lq) { dd.style.display = 'none'; return; }

  /* Búsqueda local instantánea (demo o caché) */
  const local = getProds()
    .filter(p => p.nombre.toLowerCase().includes(lq) || p.cod.toLowerCase().includes(lq))
    .slice(0, 5);
  showProductDD(local, dd);

  /* Búsqueda en Odoo con debounce si hay conexión */
  if (odooAuthenticated) {
    _productTimer = setTimeout(async () => {
      try {
        const results = await loadOdooProducts(q.trim());
        if (results.length) {
          /* Fusionar en PRODS sin duplicados */
          results.forEach(p => { if (!PRODS.find(x => x.id === p.id)) PRODS.push(p); });
          showProductDD(results.slice(0, 5), dd);
        }
      } catch (err) {
        console.warn('[Productos]', err.message);
      }
    }, 400);
  }
}

function showProductDD(prods, dd) {
  if (!prods.length) {
    dd.innerHTML = '<div class="dd-item" style="color:#94a3b8;cursor:default;font-size:11px">Sin resultados</div>';
    dd.style.display = 'block'; return;
  }
  dd.innerHTML = prods.map(p =>
    `<div class="dd-item" onclick="addItem(${p.id})">
      <div class="dd-img-sm">${p.emoji}</div>
      <div class="dd-info">
        <div class="dd-name">${p.nombre}</div>
        <div class="dd-prices">
          <span class="pe">${fUSD(p.pe)}</span>&nbsp;
          <span class="pb">${fUSD(p.pb)}</span>
        </div>
      </div>
      <span class="dd-cod">${p.cod}</span>
    </div>`
  ).join('');
  dd.style.display = 'block';
}

/* ═══════════════════════════════════════════════════════════════
   CARRITO
   ═══════════════════════════════════════════════════════════════ */
function addItem(id) {
  const p = getProds().find(x => x.id === id);
  if (!p) return;
  const idx = cart.findIndex(x => x.id === id);
  if (idx > -1) cart[idx].qty = clamp(cart[idx].qty + 1);
  else cart.push({ ...p, qty: 1 });
  document.getElementById('inp-q').value = '';
  document.getElementById('dd').style.display = 'none';
  document.getElementById('wa-preview').classList.remove('show');
  render();
  toast('✓ ' + p.nombre + ' agregado');
}

function chgQty(id, d) {
  const i = cart.find(x => x.id === id);
  if (!i) return;
  i.qty = clamp(i.qty + d);
  const inp = document.getElementById('qty-' + id);
  if (inp) inp.value = i.qty % 1 === 0 ? i.qty : i.qty.toFixed(2);
  updateTotals();
}

function setQty(id, val) {
  const i = cart.find(x => x.id === id);
  if (!i) return;
  const n = parseFloat(val);
  if (isNaN(n) || n <= 0) return;
  i.qty = clamp(n);
  updateTotals();
}

function delItem(id) {
  cart = cart.filter(x => x.id !== id);
  document.getElementById('wa-preview').classList.remove('show');
  render();
}

function updateTotals() {
  let te = 0, tb = 0;
  cart.forEach(i => {
    te += i.pe * i.qty;
    tb += i.pb * i.qty;
    const se  = document.getElementById('sube-'  + i.id);
    const sb  = document.getElementById('subb-'  + i.id);
    const sbs = document.getElementById('subbs-' + i.id);
    if (se)  se.textContent  = fUSD(i.pe * i.qty);
    if (sb)  sb.textContent  = fUSD(i.pb * i.qty);
    if (sbs) sbs.textContent = fBs(i.pb * i.qty * TASA);
  });
  document.getElementById('tot-e').textContent  = fUSD(te);
  document.getElementById('tot-b').textContent  = fUSD(tb);
  document.getElementById('tot-bs').textContent = fBs(tb * TASA);
}

function render() {
  const tb = document.getElementById('tbody');
  if (!cart.length) {
    tb.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;color:#94a3b8;font-size:11px">
      Agrega productos desde el buscador
    </td></tr>`;
    ['tot-e','tot-b'].forEach(id => document.getElementById(id).textContent = fUSD(0));
    document.getElementById('tot-bs').textContent = fBs(0);
    return;
  }
  let te = 0, tb2 = 0;
  tb.innerHTML = cart.map(i => {
    te  += i.pe * i.qty;
    tb2 += i.pb * i.qty;
    const qd = i.qty % 1 === 0 ? i.qty : i.qty.toFixed(2);
    return `<tr>
      <td style="color:#64748b;font-size:10px;font-weight:600;white-space:nowrap">${i.cod}</td>
      <td style="text-align:center"><div class="prod-img-placeholder">${i.emoji}</div></td>
      <td><div class="prod-name">${i.nombre}</div><div class="prod-uom">${i.uom}</div></td>
      <td><div class="qty-wrap">
        <button class="qb" onclick="chgQty(${i.id},-1)">−</button>
        <input id="qty-${i.id}" class="qty-inp" type="number" min="0.01" step="0.01"
          value="${qd}" inputmode="decimal"
          onchange="setQty(${i.id},this.value)" oninput="setQty(${i.id},this.value)"/>
        <button class="qb" onclick="chgQty(${i.id},1)">+</button>
      </div></td>
      <td class="sub-e" id="sube-${i.id}">${fUSD(i.pe * i.qty)}</td>
      <td>
        <div class="sub-b"  id="subb-${i.id}">${fUSD(i.pb * i.qty)}</div>
        <div class="sub-bs" id="subbs-${i.id}">${fBs(i.pb * i.qty * TASA)}</div>
      </td>
      <td><button class="del" onclick="delItem(${i.id})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button></td>
    </tr>`;
  }).join('');
  document.getElementById('tot-e').textContent  = fUSD(te);
  document.getElementById('tot-b').textContent  = fUSD(tb2);
  document.getElementById('tot-bs').textContent = fBs(tb2 * TASA);
}

/* ═══════════════════════════════════════════════════════════════
   REGLA 6A · ENVIAR A ODOO — Sales Order en estado DRAFT
   ═══════════════════════════════════════════════════════════════ */
async function sendToOdoo() {
  if (!cart.length) { toast('⚠️ El carrito está vacío', 'warn'); return; }

  const clienteName = (document.getElementById('inp-cliente').value || '').trim();
  const clienteVat  = (document.getElementById('inp-cedula').value  || '').trim();
  const vendedor    = (document.getElementById('inp-vendedor').value || 'Vendedor').trim();

  if (!clienteName) { toast('⚠️ Ingresa el nombre del cliente', 'warn'); return; }

  const btn = document.getElementById('btn-odoo');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Enviando...'; }

  try {
    /* 0 — Verificar autenticación */
    await odooAuthenticate();

    /* 1 — Verificar o crear partner */
    let partnerId = selectedPartnerId;

    if (!partnerId) {
      /* Buscar por nombre exacto o RIF */
      const domain = clienteVat
        ? ['|',['name','=',clienteName],['vat','=',clienteVat]]
        : [['name','=',clienteName]];
      const found = await odooRPC('res.partner', 'search_read',
        [domain], { fields:['id','name'], limit:1 }
      );
      if (found.length) {
        partnerId = found[0].id;
        toast('✓ Cliente encontrado en Odoo', 'info');
      } else {
        /* Crear nuevo cliente */
        partnerId = await odooRPC('res.partner', 'create',
          [{ name: clienteName, vat: clienteVat || false, customer_rank: 1 }],
          {}
        );
        toast('✓ Cliente creado: ' + clienteName, 'info');
      }
    }

    /* 2 — Crear pedido de venta en estado borrador */
    const orderId = await odooRPC('sale.order', 'create',
      [{
        partner_id: partnerId,
        state:      'draft',
        note:       `Cotización generada en piso de venta por ${vendedor} – Cotizador GONDER`,
      }],
      {}
    );

    /* 3 — Agregar líneas de pedido (SIEMPRE con Precio BCV — Regla 5) */
    for (const item of cart) {
      await odooRPC('sale.order.line', 'create',
        [{
          order_id:         orderId,
          product_id:       item.id,
          name:             item.nombre,
          product_uom_qty:  item.qty,
          price_unit:       item.pb,   // ← REGLA 5: precio BCV, nunca pe
        }],
        {}
      );
    }

    /* 4 — Obtener número de presupuesto */
    const orders = await odooRPC('sale.order', 'read', [[orderId]], { fields:['name'] });
    const orderName = orders?.[0]?.name || '#' + orderId;

    toast(`✅ ${orderName} creado – ¡Cliente puede ir a Caja!`, 'success');
    selectedPartnerId = null;  // Limpiar para próxima cotización

  } catch (err) {
    console.error('[Odoo sendToOdoo]', err);
    const msg = err.message || 'Sin conexión';
    toast('❌ Error Odoo: ' + msg, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '✉️ Enviar a Odoo'; }
  }
}

/* ═══════════════════════════════════════════════════════════════
   REGLA 6B · WHATSAPP — Mensaje profesional formateado
   ═══════════════════════════════════════════════════════════════ */
function buildWAMsg() {
  const vendedor = document.getElementById('inp-vendedor').value || '—';
  const cliente  = document.getElementById('inp-cliente').value  || '—';
  const cedula   = document.getElementById('inp-cedula').value   || '';
  const hoy      = new Date().toLocaleDateString('es-VE',{ day:'2-digit', month:'2-digit', year:'numeric' });
  let te = 0, tb = 0;
  const lineas = cart.map(i => {
    const se = i.pe * i.qty, sb = i.pb * i.qty;
    te += se; tb += sb;
    const qd = i.qty % 1 === 0 ? i.qty : i.qty.toFixed(2);
    return `• *${i.nombre}* (x${qd})\n  USD base: ${fUSD(se)} | BCV: *${fUSD(sb)}* (${fBs(sb * TASA)})`;
  }).join('\n');
  return [
    `🧾 *COTIZACIÓN GONDER*`,
    `📅 Fecha: ${hoy}`,
    ``,
    `👤 *Vendedor:* ${vendedor}`,
    `🏪 *Cliente:* ${cliente}${cedula ? '  |  ' + cedula : ''}`,
    ``,
    `${'─'.repeat(30)}`,
    `📦 *DETALLE DE PRODUCTOS*`,
    `${'─'.repeat(30)}`,
    lineas,
    `${'─'.repeat(30)}`,
    `💵 *Total USD base:*  ${fUSD(te)}`,
    `💙 *Total USD BCV:*  ${fUSD(tb)}`,
    `🇻🇪 *Total Bs. (BCV):* ${fBs(tb * TASA)}`,
    `${'─'.repeat(30)}`,
    `_Cotización generada por Cotizador GONDER_`,
    `_Tasa BCV del día: Bs. ${TASA.toFixed(2)}_`,
  ].join('\n');
}

function enviarWA() {
  if (!cart.length) { toast('⚠️ El carrito está vacío', 'warn'); return; }
  const msg  = buildWAMsg();
  const prev = document.getElementById('wa-preview');
  prev.textContent = msg;
  prev.classList.add('show');
  prev.scrollIntoView({ behavior:'smooth', block:'nearest' });
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  toast('📲 Abriendo WhatsApp...');
}

/* ═══════════════════════════════════════════════════════════════
   CERRAR DROPDOWNS AL HACER CLICK FUERA
   ═══════════════════════════════════════════════════════════════ */
document.addEventListener('click', e => {
  if (!e.target.closest('#dd-client') && !e.target.closest('#inp-cliente')) {
    const dd = document.getElementById('dd-client');
    if (dd) dd.style.display = 'none';
  }
  if (!e.target.closest('.dd-wrap')) {
    const dd = document.getElementById('dd');
    if (dd) dd.style.display = 'none';
  }
});
